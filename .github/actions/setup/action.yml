name: Setup
inputs:
  toolchain:
    description: "The Rust toolchain to install."
    required: false
    default: "stable"
  components:
    description: "Rust components to install."
    required: false
    default: ""
  targets:
    description: "Rust targets to install."
    required: false
    default: ""
  additional-toolchain:
    description: "An additional Rust toolchain to install."
    required: false
    default: ""
  additional-components:
    description: "Rust components to install for the additional toolchain."
    required: false
    default: ""
  additional-targets:
    description: "Rust targets to install for the additional toolchain."
    required: false
    default: ""
  cache-key:
    description: "A shared rust-cache key for this workload."
    required: false
    default: ""
  save-cache:
    description: "Whether rust-cache should save this workload cache."
    required: false
    default: "false"
  cache-workspace-crates:
    description: "Whether rust-cache should persist workspace crate artifacts when saving the cache."
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Configure Cargo network
      shell: bash
      run: echo "CARGO_NET_RETRY=30" >> "$GITHUB_ENV"

    # Use /mnt for Cargo builds on Linux (has ~70GB vs ~14GB on /)
    - name: Relocate Cargo directories to /mnt on Linux
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo mkdir -p /mnt/target /mnt/.cargo/bin
        sudo chown -R "$(id -u):$(id -g)" /mnt/target /mnt/.cargo
        echo "CARGO_TARGET_DIR=/mnt/target" >> "$GITHUB_ENV"
        echo "CARGO_HOME=/mnt/.cargo" >> "$GITHUB_ENV"
        echo "/mnt/.cargo/bin" >> "$GITHUB_PATH"
    - name: Install additional Rust toolchain
      if: inputs.additional-toolchain != ''
      uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
      with:
        toolchain: ${{ inputs.additional-toolchain }}
        components: ${{ inputs.additional-components }}
        targets: ${{ inputs.additional-targets }}
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}
    - name: Normalize cache key
      id: cache-key
      shell: bash
      run: |
        key="${{ inputs.cache-key }}"
        key="${key// /-}"
        key="${key//\//-}"
        echo "key=${key}" >> "$GITHUB_OUTPUT"
    - name: Configure rust cache workspace
      id: rust-cache-workspace
      shell: bash
      run: |
        target="${CARGO_TARGET_DIR:-target}"
        if [ "${RUNNER_OS:-}" = "Linux" ] && [ "${target#/}" != "$target" ]; then
          target="$(realpath --relative-to="$GITHUB_WORKSPACE" "$target")"
        fi
        echo "target=${target}" >> "$GITHUB_OUTPUT"
    - name: Setup rust cache
      if: inputs.cache-key != ''
      id: rust-cache
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        prefix-key: commonware-v3-rust
        save-if: ${{ inputs.save-cache == 'true' }}
        shared-key: ${{ steps.cache-key.outputs.key }}
        cache-on-failure: false
        cache-workspace-crates: ${{ inputs.cache-workspace-crates }}
        workspaces: . -> ${{ steps.rust-cache-workspace.outputs.target }}
        cache-directories: .retimer-state
        cache-bin: true
    - name: Restore source mtimes
      if: inputs.cache-key != '' && steps.rust-cache.outputs.cache-hit == 'true'
      shell: bash
      run: bash .github/scripts/retimer.sh restore
