# Benchmark tracking configuration.
#
# Each variant is passed to Gungraun as a filter. The `name` is the stable artifact key and the
# `filter` is the Gungraun module-path wildcard used for execution.
#
# Add one `[[packages]]` table per Cargo package/feature configuration. The same package may appear
# multiple times with different `cargo_flags`, for example to run storage benchmarks with and
# without io_uring. When doing this, set a distinct `baseline_suite` for each feature
# configuration so results are matched against the correct main-branch baseline.
#
# Gates can be set globally, per package, per benchmark, or per variant. More specific `gates`
# replace inherited gates. If no gates are supplied, the default gate is:
#
#   metric = "EstimatedCycles"
#   direction = "down"
#   threshold_percent = 10.0
#
# `direction = "down"` means lower is better, so increases beyond `threshold_percent` fail.
# `direction = "up"` means higher is better, so decreases beyond `threshold_percent` fail.
#
# Variants must be specified as tables:
#
#   [[packages.benchmarks.variants]]
#   name = "crate::bench/key=value"
#   filter = "*::bench_id"
#
#   [[packages.benchmarks.variants.gates]]
#   metric = "EstimatedCycles"
#   direction = "down"
#   threshold_percent = 10.0
#
#   [[packages.benchmarks.variants.gates]]
#   metric = "L1hits"
#   direction = "up"
#   threshold_percent = 5.0
#
# Example duplicate package configuration:
#
#   [[packages]]
#   name = "commonware-storage"
#   baseline_suite = "commonware-storage"
#   cargo_flags = ["--features", "test-traits,gungraun-bench"]
#
#   [[packages.benchmarks]]
#   name = "qmdb_gungraun"
#
#   [[packages.benchmarks.variants]]
#   name = "qmdb::merkleize/variant=... keys=10000 ch=false sync=false"
#   filter = "*::bench_id"
#
#   [[packages]]
#   name = "commonware-storage"
#   baseline_suite = "commonware-storage-iouring"
#   cargo_flags = ["--features", "commonware-runtime/iouring-storage,test-traits,gungraun-bench"]
#
#   [[packages.benchmarks]]
#   name = "qmdb_gungraun"
#
#   [[packages.benchmarks.variants]]
#   name = "qmdb::merkleize/variant=... keys=10000 ch=false sync=false"
#   filter = "*::bench_id"

[[packages]]
name = "commonware-storage"
cargo_flags = ["--features", "test-traits,gungraun-bench"]

[[packages.benchmarks]]
name = "qmdb_gungraun"

[[packages.benchmarks.variants]]
name = "qmdb::merkleize/variant=any::unordered::fixed::mmr keys=10000 ch=false sync=false"
filter = "*::bench_merkleize::any_unordered_fixed_mmr"

[[packages.benchmarks.variants]]
name = "qmdb::merkleize/variant=current::ordered::fixed::mmb chunk=256 keys=10000 ch=true sync=false"
filter = "*::bench_merkleize::current_ordered_fixed_mmb_chunk_256"
