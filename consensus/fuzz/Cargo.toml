[package]
name = "commonware-consensus-fuzz"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true

[features]
default = [ "mocks" ]
mocks = [
	"commonware-consensus/mocks",
	"commonware-cryptography/mocks",
	"commonware-p2p/mocks",
	"commonware-resolver/mocks",
]

[package.metadata]
cargo-fuzz = true

[dependencies]
arbitrary = { workspace = true, features = ["derive"] }
bytes.workspace = true
commonware-codec.workspace = true
commonware-consensus = { workspace = true, features = ["mocks", "arbitrary"] }
commonware-cryptography = { workspace = true, features = ["mocks"] }
commonware-macros.workspace = true
commonware-math.workspace = true
commonware-p2p = { workspace = true, features = ["mocks"] }
commonware-parallel.workspace = true
commonware-resolver.workspace = true
commonware-runtime.workspace = true
commonware-utils = { workspace = true, features = ["arbitrary"] }
futures.workspace = true
libfuzzer-sys.workspace = true
rand.workspace = true
rand_core.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

[dev-dependencies]
proptest.workspace = true
rand_core.workspace = true

