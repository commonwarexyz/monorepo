[package]
name = "commonware-consensus-fuzz"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true

[features]
default = [ "mocks" ]
mocks = [
	"commonware-consensus/mocks",
	"commonware-cryptography/mocks",
	"commonware-p2p/mocks",
	"commonware-resolver/mocks",
]

[package.metadata]
cargo-fuzz = true

# `cargo fuzz` sets `--cfg fuzzing`; declare it so non-fuzz builds don't warn.
[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(fuzzing)'] }

[dependencies]
arbitrary = { workspace = true, features = ["derive"] }
bytes.workspace = true
commonware-actor.workspace = true
commonware-broadcast.workspace = true
commonware-codec.workspace = true
commonware-coding.workspace = true
commonware-consensus = { workspace = true, features = ["mocks", "arbitrary"] }
commonware-cryptography = { workspace = true, features = ["mocks"] }
commonware-macros.workspace = true
commonware-math.workspace = true
commonware-p2p = { workspace = true, features = ["mocks"] }
commonware-parallel.workspace = true
commonware-resolver.workspace = true
commonware-runtime = { workspace = true, features = ["test-utils"] }
commonware-storage.workspace = true
commonware-utils = { workspace = true, features = ["arbitrary"] }
futures.workspace = true
libfuzzer-sys.workspace = true
rand.workspace = true
rand_core.workspace = true
sancov.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

[dev-dependencies]
proptest.workspace = true
rand_core.workspace = true

