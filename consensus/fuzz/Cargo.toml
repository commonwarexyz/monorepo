[package]
name = "commonware-consensus-fuzz"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true

[package.metadata]
cargo-fuzz = true

[dependencies]
arbitrary = { workspace = true, features = ["derive"] }
commonware-codec.workspace = true
commonware-consensus = { workspace = true, features = ["mocks", "arbitrary"] }
commonware-cryptography.workspace = true
commonware-macros.workspace = true
commonware-math.workspace = true
commonware-p2p = { workspace = true, features = ["mocks"] }
commonware-parallel.workspace = true
commonware-runtime.workspace = true
commonware-utils = { workspace = true, features = ["arbitrary"] }
futures.workspace = true
kdtree.workspace = true
libfuzzer-sys.workspace = true
base64.workspace = true
reqwest = { workspace = true, features = ["json", "blocking"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
sha1.workspace = true
rand.workspace = true
rand_core.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true

[dev-dependencies]
proptest.workspace = true
rand_core.workspace = true

